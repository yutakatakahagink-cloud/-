body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(160deg,#F8FAFC 0%,#E2E8F0 50%,#CBD5E1 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.url-list h2{font-size:13px;color:#1E293B;margin-bottom:12px;font-weight:700}
.url-item{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px}
.url-item:last-child{margin-bottom:0}
.url-item a{color:#2563EB;word-break:break-all;flex:1}
.url-item .copy{padding:5px 12px;font-size:10px;background:#fff;border:1px solid #E2E8F0;border-radius:8px;color:#475569;cursor:pointer;white-space:nowrap;font-weight:600;transition:all .15s}
.url-item .copy:hover{border-color:#2563EB;color:#2563EB}

<body class="hh-sora index-page">

<p class="note">※ 複数端末で同一データを表示するには <b>Firebase の設定</b> が必要です。<br>※ 古い画面が出る場合は <b>Ctrl+Shift+R</b>（強制再読み込み）してください。<br>※ 旧URL（kensaibou_hiyarihatto_v3.html）は自動でこのページへ移動します。</p>
<script>
(function(){
  var base=location.href.replace(/[^\/]*$/,'');
  var v='?v=20260526';
  [['urlUser','user.html'],['urlAdmin','admin.html'],['urlOwner','owner.html']].forEach(function(x){
    var url=base+x[1]+v;
    var a=document.getElementById(x[0]);
    if(a){a.href=url;a.textContent=url}
  });
  [['cardUser','user.html'],['cardAdmin','admin.html'],['cardOwner','owner.html']].forEach(function(x){
    var el=document.getElementById(x[0]);if(el)el.href=base+x[1]+v;
  });
})();
function copyUrl(id){var a=document.getElementById(id);var url=a.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(function(){alert('URLをコピーしました:\n'+url)})}else{var t=document.createElement('input');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('URLをコピーしました:\n'+url)}}
</script>
